<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开始备课 · 单元学历案助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #1a1a2e;
  --ink-light: #3d3d5c;
  --ink-muted: #6b6b8a;
  --gold: #c9a84c;
  --cream: #f9f6f0;
  --cream-dark: #ede8df;
  --accent: #2e6b9e;
  --accent-light: #e8f2fa;
  --green: #2d7a4a;
  --green-light: #e8f5ed;
  --border: rgba(26,26,46,0.1);
  --sidebar-w: 380px;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar ── */
.topbar {
  height: 52px;
  background: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1rem;
  flex-shrink: 0;
  z-index: 10;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-mark {
  width: 30px;
  height: 30px;
  background: var(--gold);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--ink);
}

.topbar-title {
  font-size: 14px;
  font-weight: 500;
  color: #fff;
}

.topbar-sep { flex: 1; }

.topbar-step {
  display: flex;
  align-items: center;
  gap: 6px;
}

.step-pill {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  cursor: default;
  transition: all 0.2s;
}

.step-pill.active {
  background: var(--gold);
  color: var(--ink);
  font-weight: 500;
}

.step-pill.done {
  background: rgba(45,122,74,0.4);
  color: #7dd8a0;
}

.btn-export {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}

.btn-export:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
}

/* ── Main layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left: Chat panel ── */
.chat-panel {
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: #fff;
}

.chat-header {
  padding: 1rem 1.2rem 0.8rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-header-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}

.chat-header-sub {
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 300;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 2px; }

/* Message bubbles */
.msg {
  display: flex;
  gap: 8px;
  animation: msgIn 0.25s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg.ai .msg-avatar {
  background: var(--ink);
  color: var(--gold);
  font-family: 'Noto Serif SC', serif;
}

.msg.user .msg-avatar {
  background: var(--accent-light);
  color: var(--accent);
}

.msg-body { max-width: 280px; }

.msg-bubble {
  padding: 10px 13px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.75;
  font-weight: 300;
}

.msg.ai .msg-bubble {
  background: var(--cream);
  color: var(--ink);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: var(--ink);
  color: #fff;
  border-bottom-right-radius: 4px;
  text-align: right;
}

.msg-bubble strong {
  font-weight: 500;
  color: var(--gold);
}

.msg-bubble .highlight {
  background: var(--accent-light);
  color: var(--accent);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
}

/* Confirm buttons */
.confirm-area {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.btn-confirm {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
  font-weight: 400;
}

.btn-confirm:hover, .btn-confirm.primary {
  background: var(--accent);
  color: #fff;
}

.btn-confirm.success {
  border-color: var(--green);
  color: var(--green);
}

.btn-confirm.success:hover {
  background: var(--green);
  color: #fff;
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 4px;
  padding: 10px 13px;
  background: var(--cream);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink-muted);
  animation: bounce 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* Chat input */
.chat-input-area {
  padding: 0.8rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--cream);
  border-radius: 10px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}

.chat-input-wrap:focus-within {
  border-color: var(--accent);
}

.chat-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink);
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 100px;
  overflow-y: auto;
  font-weight: 300;
}

.chat-input::placeholder { color: var(--ink-muted); }

.btn-send {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--ink);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.btn-send:hover { background: var(--accent); }
.btn-send:disabled { background: var(--cream-dark); cursor: not-allowed; }

.btn-send svg { width: 14px; height: 14px; fill: #fff; }

/* ── Right: Document preview ── */
.doc-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.doc-toolbar {
  height: 44px;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: #fff;
}

.doc-toolbar-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  letter-spacing: 0.5px;
}

.doc-toolbar-sep { flex: 1; }

.doc-status {
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 300;
}

.doc-status.saved { color: var(--green); }

.doc-content {
  flex: 1;
  overflow-y: auto;
  padding: 2.5rem 3rem;
  background: var(--cream);
}

.doc-content::-webkit-scrollbar { width: 6px; }
.doc-content::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 3px; }

.doc-paper {
  max-width: 720px;
  margin: 0 auto;
  background: #fff;
  border-radius: 8px;
  padding: 3rem;
  box-shadow: 0 2px 20px rgba(26,26,46,0.06);
  min-height: 600px;
}

/* Document styles */
.doc-unit-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.3rem;
  line-height: 1.3;
}

.doc-meta {
  font-size: 12px;
  color: var(--ink-muted);
  font-weight: 300;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 2px solid var(--ink);
}

.doc-section {
  margin-bottom: 2rem;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.doc-section-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 0.5rem;
}

.doc-section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.8rem;
  padding-left: 10px;
  border-left: 3px solid var(--gold);
}

.doc-section-body {
  font-size: 13.5px;
  line-height: 2;
  color: var(--ink-light);
  font-weight: 300;
  white-space: pre-wrap;
}

.doc-section-body.pending {
  color: var(--ink-muted);
  font-style: italic;
  font-size: 13px;
}

.doc-placeholder {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--ink-muted);
}

.doc-placeholder-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.doc-placeholder h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
}

.doc-placeholder p {
  font-size: 13px;
  font-weight: 300;
  line-height: 1.8;
}

/* API key setup */
.setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.6);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.setup-card {
  background: var(--cream);
  border-radius: 16px;
  padding: 2.5rem;
  width: 90%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(26,26,46,0.3);
}

.setup-card h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
}

.setup-card .sub {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 300;
  margin-bottom: 1.8rem;
  line-height: 1.7;
}

.setup-card label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-light);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.setup-card input {
  width: 100%;
  padding: 11px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 13px;
  font-family: monospace;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1.2rem;
}

.setup-card input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(46,107,158,0.1);
}

.setup-card .hint {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: -0.8rem;
  margin-bottom: 1.2rem;
  font-weight: 300;
}

.btn-start {
  width: 100%;
  padding: 13px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-start:hover { background: var(--accent); }

.setup-note {
  margin-top: 1rem;
  font-size: 11px;
  color: var(--ink-muted);
  text-align: center;
  font-weight: 300;
  line-height: 1.7;
}

.setup-note a {
  color: var(--accent);
  text-decoration: none;
}
</style>
</head>
<body>

<!-- API Key Setup Overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-card">
    <h2>输入你的 API Key</h2>
    <p class="sub">
      备课助手需要通过 Claude API 来生成内容。<br>
      Key 只保存在你的浏览器本地，不会上传到任何服务器。
    </p>
    <label>Claude API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." />
    <p class="hint">
      还没有？前往 <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> 免费注册获取
    </p>
    <button class="btn-start" onclick="saveApiKey()">开始备课 →</button>
    <p class="setup-note">
      Key 仅存储在本地浏览器（localStorage），刷新后需重新输入<br>
      建议在私人电脑上使用
    </p>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">
    <div class="logo-mark">学</div>
    <span class="topbar-title">单元学历案备课助手</span>
  </a>
  <div class="topbar-sep"></div>
  <div class="topbar-step">
    <div class="step-pill active" id="pill-0">背景</div>
    <div class="step-pill" id="pill-1">单元概览</div>
    <div class="step-pill" id="pill-2">课时设计</div>
    <div class="step-pill" id="pill-3">作业反思</div>
  </div>
  <button class="btn-export" onclick="exportDoc()">导出文档</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-title">AI 备课对话</div>
      <div class="chat-header-sub">逐步引导，每步确认后继续</div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="输入你的回复..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Doc panel -->
  <div class="doc-panel">
    <div class="doc-toolbar">
      <div class="doc-toolbar-title">学历案预览</div>
      <div class="doc-toolbar-sep"></div>
      <div class="doc-status" id="docStatus">等待开始...</div>
    </div>
    <div class="doc-content">
      <div class="doc-paper" id="docPaper">
        <div class="doc-placeholder">
          <div class="doc-placeholder-icon">📋</div>
          <h3>单元学历案将在这里生成</h3>
          <p>在左侧与AI对话，完成每个环节后<br>内容会实时出现在这里</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── State ──
const STATE = {
  apiKey: '',
  step: 0, // 0=背景, 1=挑战, 2=知识框架, 3=目标, 4=支招, 5=课时选择, 6=课时详情, 7=作业, 8=反思
  info: {},       // 背景信息
  doc: {          // 生成的文档内容
    unitName: '',
    subject: '',
    grade: '',
    textbook: '',
    lessonCount: '',
    challenge: '',
    knowledge: '',
    objectives: '',
    tips: '',
    lessons: [],
    homework: '',
    reflection: ''
  },
  messages: [],   // 对话历史
  isLoading: false,
  currentLesson: 0
};

// ── System Prompt ──
const SYSTEM_PROMPT = `你是一位专业的单元学历案备课助手，基于华东师范大学崔允漷团队的学历案理论框架，帮助教师设计以学生为中心、指向核心素养的单元教学方案。

【核心原则】
1. 始终坚持学生立场：所有目标、任务、过程的主语都是学生
2. 逆向设计：目标→评价任务→学习过程
3. 教-学-评一致性：目标、评价、过程三者严格对应
4. 每步生成后等待教师确认，不主动推进

【学历案三段式结构】
- 看山是山：单元概览（挑战情境、知识框架、单元目标、学习建议）
- 看山不是山：分课时学历案（课时目标、评价任务、学习过程）
- 看山还是山：作业与检测、学后反思

【对话规范】
- 语言专业友好，像有经验的教研员在协作
- 每次生成内容后，要列出2-3条质量检查点供教师参考
- 内容生成后明确询问"是否满意，还是需要修改？"
- 确认后才推进下一步

【目标叙写规范】
- 3-5条，主语是学生
- 三维句法："通过……（过程），学会……（知识技能），形成……（素养）"
- 结果可观察可测量，至少体现两个核心素养

【单元概览-挑战情境要求】
- 有明确任务驱动，真实情境
- 对2/3学生有挑战性
- 语言简洁通俗

【学习过程结构】
热身/导入 → 任务/环节1~3 → 本课小结
- 体现学习进阶（感知→理解→应用→迁移）
- 每个活动预设时间
- 评价任务嵌入相应环节
- 不要描述教师做什么，只写学生做什么

【作业三类】
1. 巩固类（必做）：基础操练
2. 检测/综合应用类（必做）：真实情境综合运用
3. 拓展提高类（选做）：明确标注"选做"

【反思三阶六级】
一阶复述→二阶关联→三阶转化，单元反思需达到二阶以上`;

// ── API Call ──
async function callClaude(userMessage) {
  STATE.messages.push({ role: 'user', content: userMessage });
  
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': STATE.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: SYSTEM_PROMPT,
      messages: STATE.messages
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || '请求失败');
  }

  const data = await response.json();
  const reply = data.content[0].text;
  STATE.messages.push({ role: 'assistant', content: reply });
  return reply;
}

// ── Chat UI ──
function addMsg(role, content, confirmBtns = []) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  
  const avatar = role === 'ai' ? '学' : '师';
  const html = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">${formatMsg(content)}</div>
      ${confirmBtns.length ? `<div class="confirm-area">${confirmBtns.map(b =>
        `<button class="btn-confirm ${b.cls||''}" onclick="${b.fn}">${b.label}</button>`
      ).join('')}</div>` : ''}
    </div>`;
  
  div.innerHTML = html;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">学</div>
    <div class="msg-body">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setLoading(v) {
  STATE.isLoading = v;
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('chatInput').disabled = v;
}

// ── Document Panel ──
function updateDoc() {
  const d = STATE.doc;
  if (!d.unitName) return;

  let html = `
    <div class="doc-unit-title">${d.unitName || '单元名称待定'}</div>
    <div class="doc-meta">${d.subject || ''} · ${d.grade || ''} · ${d.textbook || ''} · ${d.lessonCount || ''}课时</div>`;

  const sections = [
    { label: '单元概览 · 01', title: '你敢挑战吗？', key: 'challenge' },
    { label: '单元概览 · 02', title: '你需要学哪些知识？', key: 'knowledge' },
    { label: '单元概览 · 03', title: '期望你学会什么？', key: 'objectives' },
    { label: '单元概览 · 04', title: '给你支招', key: 'tips' },
  ];

  sections.forEach(s => {
    const content = d[s.key];
    html += `
      <div class="doc-section">
        <div class="doc-section-label">${s.label}</div>
        <div class="doc-section-title">${s.title}</div>
        <div class="doc-section-body ${content ? '' : 'pending'}">
          ${content || '（等待生成...）'}
        </div>
      </div>`;
  });

  // Lessons
  if (d.lessons.length > 0) {
    d.lessons.forEach((lesson, i) => {
      html += `
        <div class="doc-section">
          <div class="doc-section-label">分课时学历案 · 第${i+1}课时</div>
          <div class="doc-section-title">${lesson.name || '课时'+（i+1）}</div>
          ${lesson.objectives ? `
            <div class="doc-section-label" style="margin-top:12px">课时目标</div>
            <div class="doc-section-body">${lesson.objectives}</div>` : ''}
          ${lesson.tasks ? `
            <div class="doc-section-label" style="margin-top:12px">评价任务</div>
            <div class="doc-section-body">${lesson.tasks}</div>` : ''}
          ${lesson.process ? `
            <div class="doc-section-label" style="margin-top:12px">学习过程</div>
            <div class="doc-section-body">${lesson.process}</div>` : ''}
        </div>`;
    });
  }

  if (d.homework) {
    html += `
      <div class="doc-section">
        <div class="doc-section-label">第三部分</div>
        <div class="doc-section-title">作业与检测</div>
        <div class="doc-section-body">${d.homework}</div>
      </div>`;
  }

  if (d.reflection) {
    html += `
      <div class="doc-section">
        <div class="doc-section-label">第三部分</div>
        <div class="doc-section-title">学后反思</div>
        <div class="doc-section-body">${d.reflection}</div>
      </div>`;
  }

  document.getElementById('docPaper').innerHTML = html;
  document.getElementById('docStatus').textContent = '已自动保存';
  document.getElementById('docStatus').className = 'doc-status saved';
}

function updateStepPills(step) {
  const map = { 0: 0, 1: 1, 2: 1, 3: 1, 4: 1, 5: 2, 6: 2, 7: 3, 8: 3 };
  const active = map[step] || 0;
  ['pill-0','pill-1','pill-2','pill-3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step-pill' + (i < active ? ' done' : i === active ? ' active' : '');
  });
}

// ── Message handling ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || STATE.isLoading) return;
  
  input.value = '';
  autoResize(input);
  addMsg('user', text);
  await processUserInput(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── Step flow ──
async function processUserInput(text) {
  setLoading(true);
  showTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();

    // Parse step and update doc
    if (STATE.step === 0) {
      // Extract info from conversation
      addMsg('ai', reply, [
        { label: '✓ 信息正确，继续', cls: 'primary', fn: 'confirmBackground()' },
        { label: '修改信息', fn: 'addMsg("ai","请告诉我需要修改哪些信息")' }
      ]);
    } else if (STATE.step === 1) {
      STATE.doc.challenge = reply;
      updateDoc();
      addMsg('ai', reply, [
        { label: '✓ 满意，继续', cls: 'primary success', fn: 'confirmStep(1)' },
        { label: '重新生成', fn: 'regenerate(1)' },
        { label: '我来修改', fn: 'editMode(1)' }
      ]);
    } else if (STATE.step === 2) {
      STATE.doc.knowledge = reply;
      updateDoc();
      addMsg('ai', reply, [
        { label: '✓ 满意，继续', cls: 'primary success', fn: 'confirmStep(2)' },
        { label: '重新生成', fn: 'regenerate(2)' }
      ]);
    } else if (STATE.step === 3) {
      STATE.doc.objectives = reply;
      updateDoc();
      addMsg('ai', reply, [
        { label: '✓ 满意，继续', cls: 'primary success', fn: 'confirmStep(3)' },
        { label: '重新生成', fn: 'regenerate(3)' }
      ]);
    } else if (STATE.step === 4) {
      STATE.doc.tips = reply;
      updateDoc();
      addMsg('ai', reply, [
        { label: '✓ 单元概览完成！', cls: 'primary success', fn: 'confirmStep(4)' },
        { label: '重新生成', fn: 'regenerate(4)' }
      ]);
    } else {
      addMsg('ai', reply);
    }
  } catch (e) {
    removeTyping();
    addMsg('ai', `❌ 出错了：${e.message}\n\n请检查 API Key 是否正确，或稍后重试。`);
  }

  setLoading(false);
  updateStepPills(STATE.step);
}

// ── Step confirmations ──
function confirmBackground() {
  STATE.step = 1;
  updateStepPills(1);
  // Extract info if mentioned
  const msgs = STATE.messages;
  // Trigger challenge generation
  const prompt = `很好！现在请根据我提供的信息，生成"你敢挑战吗？"部分——也就是单元的大任务或大情境。

要求：
- 创设真实或高度模拟真实的情境
- 有明确的任务驱动
- 对2/3的学生有一定挑战性
- 语言简洁通俗，符合该年段学生阅读水平
- 不超过150字

生成后请附上3条质量检查点。`;
  
  document.getElementById('chatInput').value = '';
  addMsg('user', '信息确认，请生成"你敢挑战吗？"部分');
  
  setLoading(true);
  showTyping();
  
  callClaude(prompt).then(reply => {
    removeTyping();
    STATE.doc.challenge = reply;
    updateDoc();
    addMsg('ai', reply, [
      { label: '✓ 满意，继续', cls: 'primary success', fn: 'confirmStep(1)' },
      { label: '重新生成', fn: 'regenerate(1)' },
      { label: '告诉我修改意见', fn: '' }
    ]);
    setLoading(false);
    updateStepPills(1);
  }).catch(e => {
    removeTyping();
    addMsg('ai', `出错：${e.message}`);
    setLoading(false);
  });
}

async function confirmStep(step) {
  const nextPrompts = {
    1: `很好！挑战情境已确认。\n\n现在请生成"你需要学哪些知识？"部分。\n要求：\n- 呈现本单元各课时主题及其逻辑关系\n- 以结构化文字描述（因页面限制，用文字描述知识框架，描述各课时主题及关联）\n- 整体感要强，不要太细节\n\n生成后附3条质量检查点。`,
    2: `知识框架已确认。\n\n现在请生成"期望你学会什么？"——单元学习目标。\n要求：\n- 写3-5条\n- 主语是学生\n- 采用三维句法：通过……（过程），学会……（知识技能），形成……（核心素养）\n- 结果可观察可测量\n- 至少体现两个核心素养\n- 难度保证2/3学生能达成\n\n生成后附质量检查清单。`,
    3: `单元目标已确认。\n\n现在请生成"给你支招"部分——为学生提供学习路径和方法建议。\n要求：\n- 呈现进阶性的学习路线图\n- 包含问题链或任务串提示\n- 提供重要学习资源或方法建议\n- 让学生感到"有用、可以学会"\n- 200字以内\n\n生成后附质量检查点。`,
    4: `太好了！单元概览四个部分全部完成！🎉\n\n接下来进入**分课时备课**阶段。\n请告诉我：你想先备第几课时？（请输入数字，如"1"表示第一课时）`
  };

  STATE.step = step + 1;
  updateStepPills(STATE.step);

  if (step === 4) {
    addMsg('ai', nextPrompts[4]);
    return;
  }

  addMsg('user', '满意，请继续');
  setLoading(true);
  showTyping();

  try {
    const reply = await callClaude(nextPrompts[step]);
    removeTyping();

    const keyMap = { 1: 'knowledge', 2: 'objectives', 3: 'tips' };
    if (keyMap[step]) {
      STATE.doc[keyMap[step]] = reply;
      updateDoc();
    }

    const nextStep = step + 1;
    addMsg('ai', reply, [
      { label: nextStep === 4 ? '✓ 单元概览完成！' : '✓ 满意，继续', cls: 'primary success', fn: `confirmStep(${nextStep})` },
      { label: '重新生成', fn: `regenerate(${nextStep})` }
    ]);
  } catch (e) {
    removeTyping();
    addMsg('ai', `出错：${e.message}`);
  }

  setLoading(false);
}

async function regenerate(step) {
  const regenPrompts = {
    1: '请重新生成"你敢挑战吗？"部分，尝试不同的情境角度，保持要求不变。',
    2: '请重新生成知识框架部分，调整呈现方式，让逻辑关系更清晰。',
    3: '请重新生成单元学习目标，注意三维句法和素养导向，尝试更精准的表达。',
    4: '请重新生成"给你支招"部分，让建议更具体实用。'
  };

  addMsg('user', '请重新生成');
  setLoading(true);
  showTyping();

  try {
    const reply = await callClaude(regenPrompts[step] || '请重新生成');
    removeTyping();

    const keyMap = { 1: 'challenge', 2: 'knowledge', 3: 'objectives', 4: 'tips' };
    if (keyMap[step]) {
      STATE.doc[keyMap[step]] = reply;
      updateDoc();
    }

    addMsg('ai', reply, [
      { label: '✓ 满意，继续', cls: 'primary success', fn: `confirmStep(${step})` },
      { label: '再次重新生成', fn: `regenerate(${step})` }
    ]);
  } catch (e) {
    removeTyping();
    addMsg('ai', `出错：${e.message}`);
  }

  setLoading(false);
}

// ── Export ──
function exportDoc() {
  const d = STATE.doc;
  if (!d.unitName) {
    alert('还没有生成内容，请先完成备课对话');
    return;
  }

  let text = `单元学历案\n${'='.repeat(40)}\n\n`;
  text += `单元名称：${d.unitName}\n`;
  text += `学科年级：${d.subject} ${d.grade}\n`;
  text += `教材：${d.textbook}\n`;
  text += `课时数：${d.lessonCount}\n\n`;
  text += `【一、你敢挑战吗？】\n${d.challenge}\n\n`;
  text += `【二、你需要学哪些知识？】\n${d.knowledge}\n\n`;
  text += `【三、期望你学会什么？】\n${d.objectives}\n\n`;
  text += `【四、给你支招】\n${d.tips}\n\n`;

  d.lessons.forEach((l, i) => {
    text += `【第${i+1}课时：${l.name}】\n`;
    text += `课时目标：\n${l.objectives}\n\n`;
    text += `评价任务：\n${l.tasks}\n\n`;
    text += `学习过程：\n${l.process}\n\n`;
  });

  if (d.homework) text += `【作业与检测】\n${d.homework}\n\n`;
  if (d.reflection) text += `【学后反思】\n${d.reflection}\n\n`;

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${d.unitName || '单元学历案'}.txt`;
  a.click();
}

// ── API Key setup ──
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('请输入正确的 Claude API Key（以 sk-ant- 开头）');
    return;
  }
  STATE.apiKey = key;
  document.getElementById('setupOverlay').style.display = 'none';
  startConversation();
}

function startConversation() {
  addMsg('ai', `你好！👋 我是单元学历案备课助手。

我们将按照**崔允漷学历案理论框架**，一步步完成你的单元备课设计。

首先，请告诉我以下信息：
- **学科**：（如语文、数学、历史…）
- **学段年级**：（如初中八年级）
- **教材版本**：（如人教版上册）
- **单元名称**：（如第三单元《……》）
- **计划课时数**：（如4课时）
- **班级学情简述**：（学生起点、重难点预判）

可以直接回复，格式不限！`);
}

// ── Init ──
window.onload = () => {
  // Check stored key
  const stored = sessionStorage.getItem('claude_key');
  if (stored) {
    STATE.apiKey = stored;
    document.getElementById('setupOverlay').style.display = 'none';
    startConversation();
  }
};

document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveApiKey();
});

// Save key to session (not localStorage for security)
const origSave = saveApiKey;
window.saveApiKey = function() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('请输入正确的 Claude API Key（以 sk-ant- 开头）');
    return;
  }
  STATE.apiKey = key;
  sessionStorage.setItem('claude_key', key);
  document.getElementById('setupOverlay').style.display = 'none';
  startConversation();
};
</script>
