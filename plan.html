<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开始备课 · 单元学历案助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink: #1a1a2e; --ink-light: #3d3d5c; --ink-muted: #6b6b8a;
  --gold: #c9a84c; --gold-light: #f5ecd4;
  --cream: #f9f6f0; --cream-dark: #ede8df;
  --accent: #2e6b9e; --accent-light: #e8f2fa;
  --green: #2d7a4a; --green-light: #e8f5ed;
  --border: rgba(26,26,46,0.1);
}
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══ 顶部导航 ══ */
.topbar {
  height: 48px;
  background: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 1.2rem;
  gap: 1rem;
  flex-shrink: 0;
}
.topbar-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.logo-mark { width: 28px; height: 28px; background: var(--gold); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 14px; color: var(--ink); }
.topbar-title { font-size: 13px; font-weight: 500; color: #fff; }
.topbar-sep { flex: 1; }
.btn-export { font-size: 12px; padding: 5px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif; }
.btn-export:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* ══ 固定背景信息栏 ══ */
.info-bar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  transition: all 0.3s ease;
}

.info-bar-header {
  display: flex;
  align-items: center;
  padding: 0 1.2rem;
  height: 40px;
  cursor: pointer;
  user-select: none;
  gap: 10px;
}

.info-bar-tag {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  background: var(--gold-light);
  padding: 2px 8px;
  border-radius: 4px;
}

.info-bar-summary {
  flex: 1;
  font-size: 12px;
  color: var(--ink-muted);
  font-weight: 300;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.info-bar-summary b { font-weight: 500; color: var(--ink); }

.info-toggle {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid rgba(46,107,158,0.2);
  background: var(--accent-light);
  transition: all 0.2s;
}
.info-toggle:hover { background: var(--accent); color: #fff; }

/* 展开的表单区域 */
.info-form {
  padding: 0 1.2rem 1rem;
  display: none;
  border-top: 1px solid var(--border);
  background: #fafafa;
}
.info-form.open { display: block; }

.info-form-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr) repeat(3, 1fr);
  gap: 10px;
  padding-top: 0.8rem;
  align-items: end;
}

.info-form-group { display: flex; flex-direction: column; gap: 4px; }

.info-form-group label {
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.info-form-group select,
.info-form-group input {
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 12px;
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}

.info-form-group select:focus,
.info-form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(46,107,158,0.08);
}

.info-situa { grid-column: span 2; }

.info-form-actions {
  display: flex;
  gap: 8px;
  padding-top: 0.8rem;
  align-items: center;
}

.btn-confirm-info {
  padding: 7px 20px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-confirm-info:hover { background: var(--accent); }

.btn-reset-info {
  padding: 7px 14px;
  background: transparent;
  color: var(--ink-muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset-info:hover { color: var(--ink); border-color: var(--ink-muted); }

.info-hint {
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 300;
  margin-left: 4px;
}

/* ══ 步骤导航 ══ */
.step-nav {
  background: #fff;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.2rem;
  height: 38px;
  gap: 4px;
  flex-shrink: 0;
}

.step-tab {
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 6px;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 300;
  border: none;
  background: transparent;
  font-family: 'Noto Sans SC', sans-serif;
  white-space: nowrap;
}
.step-tab:hover { background: var(--cream); color: var(--ink); }
.step-tab.active { background: var(--ink); color: #fff; font-weight: 500; }
.step-tab.done { background: var(--green-light); color: var(--green); }

.step-arrow { color: var(--border); font-size: 14px; padding: 0 2px; }

/* ══ 主内容区 ══ */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── 左侧对话区 ── */
.chat-panel {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: #fff;
}

.chat-label {
  padding: 8px 1rem;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--ink-muted);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: #fafafa;
  flex-shrink: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 2px; }

.msg { display: flex; gap: 8px; animation: msgIn 0.2s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

.msg-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500;
  flex-shrink: 0; margin-top: 2px;
}
.msg.ai .msg-av { background: var(--ink); color: var(--gold); font-family: 'Noto Serif SC', serif; }
.msg.user .msg-av { background: var(--accent-light); color: var(--accent); font-size: 10px; }

.msg-body { max-width: 280px; }
.msg-bub {
  padding: 9px 12px;
  border-radius: 10px;
  font-size: 12.5px;
  line-height: 1.8;
  font-weight: 300;
}
.msg.ai .msg-bub { background: var(--cream); color: var(--ink); border-bottom-left-radius: 3px; }
.msg.user .msg-bub { background: var(--ink); color: #fff; border-bottom-right-radius: 3px; }
.msg-bub b { font-weight: 500; color: var(--gold); }
.msg.user .msg-bub b { color: #ffd980; }

.btn-area { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 5px; }
.btn-q {
  font-size: 11px; padding: 4px 11px;
  border-radius: 16px;
  border: 1px solid var(--accent);
  background: transparent; color: var(--accent);
  cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.18s;
}
.btn-q:hover, .btn-q.ok { background: var(--accent); color: #fff; }
.btn-q.g { border-color: var(--green); color: var(--green); }
.btn-q.g:hover { background: var(--green); color: #fff; }

.typing {
  display: flex; gap: 4px;
  padding: 9px 12px;
  background: var(--cream);
  border-radius: 10px; border-bottom-left-radius: 3px;
  width: fit-content;
}
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-muted); animation: bo 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bo { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

.chat-input-area { padding: 0.7rem; border-top: 1px solid var(--border); flex-shrink: 0; }
.inp-wrap {
  display: flex; gap: 7px; align-items: flex-end;
  background: var(--cream); border-radius: 8px;
  padding: 7px 9px; border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.inp-wrap:focus-within { border-color: var(--accent); }
.chat-inp {
  flex: 1; border: none; background: transparent;
  font-size: 12.5px; font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink); resize: none; outline: none;
  line-height: 1.5; max-height: 80px; overflow-y: auto; font-weight: 300;
}
.chat-inp::placeholder { color: var(--ink-muted); }
.btn-send {
  width: 28px; height: 28px;
  border-radius: 7px; background: var(--ink);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}
.btn-send:hover { background: var(--accent); }
.btn-send:disabled { background: var(--cream-dark); cursor: not-allowed; }
.btn-send svg { width: 13px; height: 13px; fill: #fff; }

/* ── 右侧文档区 ── */
.doc-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.doc-toolbar {
  height: 40px; padding: 0 1.2rem;
  display: flex; align-items: center; gap: 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: #fff;
}
.doc-toolbar-title { font-size: 11px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.5px; text-transform: uppercase; }
.doc-toolbar-sep { flex: 1; }
.doc-status { font-size: 11px; color: var(--ink-muted); font-weight: 300; }
.doc-status.saved { color: var(--green); }

.doc-content {
  flex: 1; overflow-y: auto;
  padding: 2rem 2.5rem;
  background: var(--cream);
}
.doc-content::-webkit-scrollbar { width: 5px; }
.doc-content::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 3px; }

.doc-paper {
  max-width: 700px; margin: 0 auto;
  background: #fff; border-radius: 8px;
  padding: 2.5rem;
  box-shadow: 0 2px 16px rgba(26,26,46,0.05);
  min-height: 400px;
}

.doc-unit-title { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: var(--ink); margin-bottom: 0.25rem; }
.doc-meta { font-size: 11px; color: var(--ink-muted); font-weight: 300; margin-bottom: 1.8rem; padding-bottom: 1.2rem; border-bottom: 2px solid var(--ink); }

.doc-sec { margin-bottom: 1.8rem; animation: fi 0.3s ease; }
@keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.doc-sec-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 4px; }
.doc-sec-title { font-family: 'Noto Serif SC', serif; font-size: 0.95rem; font-weight: 600; color: var(--ink); margin-bottom: 0.6rem; padding-left: 9px; border-left: 3px solid var(--gold); }
.doc-sec-body { font-size: 13px; line-height: 2; color: var(--ink-light); font-weight: 300; white-space: pre-wrap; }

.doc-empty { text-align: center; padding: 3.5rem 2rem; color: var(--ink-muted); }
.doc-empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.25; }
.doc-empty h3 { font-family: 'Noto Serif SC', serif; font-size: 1rem; color: var(--ink-light); margin-bottom: 0.4rem; font-weight: 600; }
.doc-empty p { font-size: 12px; font-weight: 300; line-height: 1.8; }

/* 需要填写提示 */
.need-info {
  display: flex; align-items: center; justify-content: center;
  height: 100%; flex-direction: column; gap: 12px;
  color: var(--ink-muted); text-align: center; padding: 2rem;
}
.need-info-icon { font-size: 2rem; opacity: 0.3; }
.need-info p { font-size: 13px; font-weight: 300; line-height: 1.8; }
.need-info .arrow { color: var(--gold); font-weight: 500; font-size: 14px; }
</style>
</head>
<body>

<!-- ══ API Key 弹窗 ══ -->
<div id="keyOverlay" style="display:none!important" hidden style="position:fixed;inset:0;background:rgba(26,26,46,0.75);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div style="background:#f9f6f0;border-radius:16px;padding:2.5rem;width:90%;max-width:460px;box-shadow:0 20px 60px rgba(26,26,46,0.3);">
    <div style="font-family:serif;font-size:1.2rem;font-weight:700;margin-bottom:0.3rem;color:#1a1a2e;">输入豆包 API Key</div>
    <p style="font-size:13px;color:#6b6b8a;font-weight:300;margin-bottom:1.5rem;line-height:1.8;">Key 只保存在你自己的浏览器里，不会上传到任何地方。<br>还没有？前往 <a href="https://console.volcengine.com" target="_blank" style="color:#2e6b9e;">火山引擎控制台</a> 免费注册获取。</p>
    <label style="display:block;font-size:11px;font-weight:500;color:#6b6b8a;margin-bottom:6px;">豆包 API Key</label>
    <input id="keyInput" type="password" placeholder="apikey-xxxxxxxxxxxxxxxxxxxx"
      style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(26,26,46,0.15);background:#fff;font-size:13px;font-family:monospace;color:#1a1a2e;outline:none;margin-bottom:0.4rem;display:block;"
      onkeydown="if(event.key==='Enter')saveKey()">
    <p style="font-size:11px;color:#6b6b8a;margin-bottom:1.5rem;font-weight:300;">格式：apikey- 开头，在火山方舟 → API Key 管理中复制</p>
    <button onclick="saveKey()" style="width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;">确认，开始使用 →</button>
    <p style="font-size:11px;color:#6b6b8a;text-align:center;margin-top:0.8rem;font-weight:300;">Key 存在浏览器本地，换设备或清除缓存后需重新输入</p>
  </div>
</div>

<!-- ══ 顶部导航 ══ -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">
    <div class="logo-mark">学</div>
    <span class="topbar-title">单元学历案备课助手</span>
  </a>
  <div class="topbar-sep"></div>
  <button class="btn-export" onclick="exportDoc()">导出文档</button>
</div>

<!-- ══ 固定背景信息栏 ══ -->
<div class="info-bar" id="infoBar">
  <!-- 收起状态：显示摘要 -->
  <div class="info-bar-header" onclick="toggleInfoBar()">
    <span class="info-bar-tag">备课信息</span>
    <div class="info-bar-summary" id="infoSummary">
      请先填写学科、年级、教材、单元等信息，再开始备课
    </div>
    <span class="info-toggle" id="infoToggleBtn">填写信息 ▾</span>
  </div>

  <!-- 展开状态：填写表单 -->
  <div class="info-form" id="infoForm">
    <div class="info-form-grid">
      <div class="info-form-group">
        <label>学科</label>
        <select id="f-subject" onchange="updateTextbook()">
          <option value="">请选择</option>
          <option>语文</option><option>数学</option><option>英语</option>
          <option>物理</option><option>化学</option><option>生物</option>
          <option>历史</option><option>地理</option><option>道德与法治</option>
          <option>科学</option><option>美术</option><option>音乐</option>
          <option>体育与健康</option><option>信息技术</option>
        </select>
      </div>
      <div class="info-form-group">
        <label>教材版本</label>
        <select id="f-textbook">
          <option value="">请先选学科</option>
        </select>
      </div>
      <div class="info-form-group">
        <label>年级</label>
        <select id="f-grade">
          <option value="">请选择</option>
          <option>一年级</option><option>二年级</option><option>三年级</option>
          <option>四年级</option><option>五年级</option><option>六年级</option>
          <option>七年级</option><option>八年级</option><option>九年级</option>
          <option>高一</option><option>高二</option><option>高三</option>
        </select>
      </div>
      <div class="info-form-group">
        <label>上/下册</label>
        <select id="f-volume">
          <option value="">请选择</option>
          <option>上册</option>
          <option>下册</option>
          <option>全册</option>
        </select>
      </div>
      <div class="info-form-group">
        <label>单元</label>
        <select id="f-unit">
          <option value="">请选择</option>
          <option>第一单元</option><option>第二单元</option><option>第三单元</option>
          <option>第四单元</option><option>第五单元</option><option>第六单元</option>
          <option>第七单元</option><option>第八单元</option>
        </select>
      </div>
      <div class="info-form-group">
        <label>课时数</label>
        <select id="f-lessons">
          <option value="">请选择</option>
          <option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
        </select>
      </div>
      <div class="info-form-group info-situa" style="grid-column:span 3;">
        <label>学情简述</label>
        <input type="text" id="f-situation" placeholder="如：学生已学过…，重难点是…，整体基础中等">
      </div>
    </div>
    <div class="info-form-actions">
      <button class="btn-confirm-info" onclick="confirmInfo()">✓ 确认信息，开始备课</button>
      <button class="btn-reset-info" onclick="resetInfo()">重置</button>
      <span class="info-hint">确认后可随时点击上方修改</span>
    </div>
  </div>
</div>

<!-- ══ 步骤导航 ══ -->
<div class="step-nav">
  <button class="step-tab active" id="tab-0" onclick="switchTab(0)">单元概览</button>
  <span class="step-arrow">›</span>
  <button class="step-tab" id="tab-1" onclick="switchTab(1)">第1课时</button>
  <span class="step-arrow">›</span>
  <button class="step-tab" id="tab-2" onclick="switchTab(2)">第2课时</button>
  <span class="step-arrow">›</span>
  <button class="step-tab" id="tab-3" onclick="switchTab(3)">第3课时</button>
  <span class="step-arrow">›</span>
  <button class="step-tab" id="tab-4" onclick="switchTab(4)">作业与反思</button>
  <div style="flex:1"></div>
  <span style="font-size:11px;color:var(--ink-muted);font-weight:300">点击标签切换备课内容</span>
</div>

<!-- ══ 主内容区 ══ -->
<div class="main">

  <!-- 左：对话 -->
  <div class="chat-panel">
    <div class="chat-label">AI 备课对话</div>
    <div class="chat-messages" id="msgs"></div>
    <div class="chat-input-area">
      <div class="inp-wrap">
        <textarea class="chat-inp" id="inp"
          placeholder="输入回复，Enter 发送..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 右：文档预览 -->
  <div class="doc-panel">
    <div class="doc-toolbar">
      <div class="doc-toolbar-title">学历案预览</div>
      <div class="doc-toolbar-sep"></div>
      <div class="doc-status" id="docStatus">等待开始...</div>
    </div>
    <div class="doc-content">
      <div class="doc-paper" id="docPaper">
        <div class="doc-empty">
          <div class="doc-empty-icon">📋</div>
          <h3>单元学历案将在这里生成</h3>

// ══ 气泡 ══
function addBubble(role, text, btns=[], save=false) {
  const w = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `
    <div class="msg-av">${role==='ai'?'学':'师'}</div>
    <div class="msg-body">
      <div class="msg-bub">${fmt(text)}</div>
      ${btns.length?`<div class="btn-area">${btns.map(b=>`<button class="btn-q ${b.cls||''}" onclick="${b.fn}">${b.label}</button>`).join('')}</div>`:''}
    </div>`;
  w.appendChild(d);
  w.scrollTop = w.scrollHeight;
  if (save) {
    ST.chatContexts[ST.currentTab].push({ role, _display:{ text, btns } });
  }
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
}

function showTyping() {
  const w = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className='msg ai'; d.id='typ';
  d.innerHTML=`<div class="msg-av">学</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}
function hideTyping() { const e=document.getElementById('typ'); if(e)e.remove(); }

function setLoad(v) {
  ST.loading=v;
  document.getElementById('sendBtn').disabled=v;
  document.getElementById('inp').disabled=v;
}

// ══ API ══
async function callAI(userText, tab) {
  const ctx = ST.chatContexts[tab];
  const msgs = ctx.filter(m=>m.role).map(m=>({ role:m.role, content:m.content||m._display?.text||'' }));
  msgs.push({ role:'user', content: userText });

  const infoCtx = `【当前备课信息】学科：${ST.info.subject}，年级：${ST.info.grade}，教材：${ST.info.textbook}，单元：${ST.info.unit}，课时数：${ST.info.lessons}，学情：${ST.info.situation}`;

  const r = await fetch(CFG.url, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': CFG.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: CFG.model,
      max_tokens: 2000,
      system: SYS + '\n\n' + infoCtx,
      messages: msgs
    })
  });
  if(!r.ok){
    let errMsg = `请求失败 (${r.status})`;
    try { const e=await r.json(); errMsg=e.error?.message||errMsg; } catch(e){}
    throw new Error(errMsg);
  }
  const data = await r.json();
  const reply = data.content[0].text;
  ST.chatContexts[tab].push({role:'user', content:userText});
  ST.chatContexts[tab].push({role:'assistant', content:reply, _display:{text:reply}});
  return reply;
}

// ══ 用户发送 ══
async function sendMsg() {
  if(!ST.infoConfirmed){ alert('请先填写并确认备课信息'); return; }
  const inp=document.getElementById('inp');
  const t=inp.value.trim(); if(!t||ST.loading) return;
  inp.value=''; autoResize(inp);
  addBubble('user', t);
  ST.chatContexts[ST.currentTab].push({role:'user', content:t, _display:{text:t}});
  setLoad(true); showTyping();
  try {
    const reply = await callAI(t, ST.currentTab);
    hideTyping();
    addBubble('ai', reply, [], false);
    // 更新对话记录中最后一条
  } catch(e){ hideTyping(); addBubble('ai',`❌ 出错：${e.message}`); }
  setLoad(false);
}

  }

  if (d.challenge) h += sec('单元概览 · 01','你敢挑战吗？', d.challenge);
  if (d.knowledge) h += sec('单元概览 · 02','你需要学哪些知识？', d.knowledge);
  if (d.objectives) h += sec('单元概览 · 03','期望你学会什么？', d.objectives);
  if (d.tips) h += sec('单元概览 · 04','给你支招', d.tips);

  d.lessons.forEach((l,i)=>{
    if(!l.process) return;
    h += `<div class="doc-sec">
      <div class="doc-sec-lbl">分课时学历案 · 第${i+1}课时</div>
      <div class="doc-sec-title">${l.name||'第'+(i+1)+'课时'}</div>
      <div class="doc-sec-body">${l.process}</div>
    </div>`;
  });

  if (d.homework) h += sec('第三部分','作业与反思', d.homework);

  if (!h) {
    h = `<div class="doc-empty"><div class="doc-empty-icon">📋</div><h3>单元学历案将在这里生成</h3><p>先在上方填写备课信息<br>然后在左侧与AI对话<br>内容会实时显示在这里</p></div>`;
  }

  document.getElementById('docPaper').innerHTML = h;
  const s = document.getElementById('docStatus');
  s.textContent = '已自动保存'; s.className = 'doc-status saved';
}

function sec(lbl, title, body) {
  return `<div class="doc-sec">
    <div class="doc-sec-lbl">${lbl}</div>
    <div class="doc-sec-title">${title}</div>
    <div class="doc-sec-body">${body}</div>
  </div>`;
}

// ══ 开始对话 ══
function startChat() {
  ST.chatContexts = { 0:[], 1:[], 2:[], 3:[], 4:[] };
  ST.steps = { 0:0, 1:0, 2:0, 3:0, 4:0 };
  renderDoc();
  switchTab(0);
}

// ══ 导出 ══
function exportDoc() {
  const d=ST.doc; const inf=ST.info;
  if(!d.challenge&&!inf.unit){ alert('还没有生成内容'); return; }
  let t=`单元学历案\n${'='.repeat(40)}\n\n`;
  t+=`单元：${inf.unit}\n学科年级：${inf.subject} ${inf.grade}\n教材：${inf.textbook}\n课时数：${inf.lessons}\n\n`;
  if(d.challenge) t+=`一、你敢挑战吗？\n${d.challenge}\n\n`;
  if(d.knowledge) t+=`二、你需要学哪些知识？\n${d.knowledge}\n\n`;
  if(d.objectives) t+=`三、期望你学会什么？\n${d.objectives}\n\n`;
  if(d.tips) t+=`四、给你支招\n${d.tips}\n\n`;
  d.lessons.forEach((l,i)=>{ if(l.process) t+=`第${i+1}课时\n${l.process}\n\n`; });
  if(d.homework) t+=`作业与反思\n${d.homework}\n\n`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([t],{type:'text/plain;charset=utf-8'}));
  a.download=`${inf.unit||'单元学历案'}.txt`; a.click();
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

// ══ 初始化 ══
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('apikey-')) { alert('请输入正确的豆包 API Key（以 apikey- 开头）'); return; }
  localStorage.setItem('doubao_key', k);
  document.getElementById('keyOverlay').style.display = 'none';
  initPage();
}

function initPage() {
  document.getElementById('infoForm').classList.add('open');
  document.getElementById('infoToggleBtn').textContent = '收起 ▴';
  addBubble('ai', `你好！👋 **请先在上方填写备课信息**，填写完成后点"确认信息，开始备课"按钮，我们就开始！\n\n整个备课分三段：\n📍 **看山是山** → 单元概览\n📍 **看山不是山** → 分课时学历案\n📍 **看山还是山** → 作业与反思`, []);
}

window.onload = () => {
  initPage();
};
</script>
